name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m venv .venv
      - run: .venv/bin/pip install -U pip
      - run: .venv/bin/pip install -e ".[dev]"

      - name: Lint (ruff)
        run: .venv/bin/ruff check ezop/ tests/

      - name: Format check (ruff)
        run: .venv/bin/ruff format --check ezop/ tests/

      - name: Type check (pyright)
        run: .venv/bin/pyright ezop/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: python -m venv .venv
      - run: .venv/bin/pip install -U pip
      - run: .venv/bin/pip install -e ".[dev]"

      - name: Run tests
        run: make test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m venv .venv
      - run: .venv/bin/pip install -U pip
      - run: .venv/bin/pip install -e ".[dev]"

      - name: Build wheel
        run: .venv/bin/python -m build

      - name: Check wheel installs cleanly
        run: .venv/bin/pip install dist/ezop-*.whl --force-reinstall

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezop-wheel
          path: python/dist/ezop-*.whl
