name: UI

on:
  push:
    branches: [main]
    paths:
      - 'ezop-light-ui/**'
      - '.github/workflows/ui.yml'
  pull_request:
    paths:
      - 'ezop-light-ui/**'
      - '.github/workflows/ui.yml'

jobs:
  lint-build:
    name: UI Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ezop-light-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ezop-light-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://unused:unused@localhost/unused"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://unused:unused@localhost/unused"
          AUTH_SECRET: "ci-secret-at-least-32-characters-long"
          EZOP_API_URL: "http://localhost:13000"

  e2e:
    name: UI E2E Tests
    runs-on: ubuntu-latest
    needs: lint-build
    defaults:
      run:
        working-directory: ezop-light-ui

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ezop
          POSTGRES_PASSWORD: ezop
          POSTGRES_DB: ezop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ezop-light-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client & push schema
        run: |
          npx prisma generate
          npx prisma db push
        env:
          DATABASE_URL: "postgresql://ezop:ezop@localhost:5432/ezop_test"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: "postgresql://ezop:ezop@localhost:5432/ezop_test"
          AUTH_SECRET: "ci-secret-at-least-32-characters-long"
          AUTH_TEST_SECRET: ${{ secrets.AUTH_TEST_SECRET || 'ci-e2e-test-secret-playwright' }}
          EZOP_API_URL: "http://localhost:13000"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ezop-light-ui/playwright-report/
          retention-days: 7
