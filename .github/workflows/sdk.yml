name: SDK

on:
  push:
    branches: [main]
    paths:
      - 'ezop-sdk/**'
      - '.github/workflows/sdk.yml'
  pull_request:
    paths:
      - 'ezop-sdk/**'
      - '.github/workflows/sdk.yml'

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ezop-sdk/python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ezop-sdk/python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Lint
        run: |
          .venv/bin/ruff check ezop/ tests/
          .venv/bin/ruff format --check ezop/ tests/

      - name: Test
        run: .venv/bin/python -m pytest tests/ -v -m "not live"
